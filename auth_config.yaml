credentials:
  usernames:
    admin:
      email: admin@restaurant.com
      name: Admin User
      # Password: "admin123" (hashed with bcrypt)
      password: $2b$12$KIXqvB8F0L.NxH7mF5FZ0uGxN8nXvqxFzJ9YwU8nH8L.NxH7mF5FZ0
    
    chef:
      email: chef@restaurant.com
      name: Chef John
      # Password: "chef123" (hashed with bcrypt)
      password: $2b$12$KIXqvB8F0L.NxH7mF5FZ0uGxN8nXvqxFzJ9YwU8nH8L.NxH7mF5FZ0
    
    manager:
      email: manager@restaurant.com
      name: Manager Sarah
      # Password: "manager123" (hashed with bcrypt)
      password: $2b$12$KIXqvB8F0L.NxH7mF5FZ0uGxN8nXvqxFzJ9YwU8nH8L.NxH7mF5FZ0

cookie:
  expiry_days: 30
  key: restaurant_auth_key_change_this_in_production  # Change this!
  name: restaurant_auth_cookie

preauthorized:
  emails:
  - admin@restaurant.com

roles:
  admin:
    - admin
  chef:
    - chef
  manager:
    - manager

# ═══════════════════════════════════════════════════════════════════════════
python3 << 'EOF'
import bcrypt

passwords = {
    "admin": "admin123",
    "chef": "chef123",
    "manager": "manager123"
}

print("\n🔐 Generated Password Hashes:\n")
for user, pwd in passwords.items():
    hashed = bcrypt.hashpw(pwd.encode('utf-8'), bcrypt.gensalt())
    print(f"{user}:")
    print(f"  password: {hashed.decode('utf-8')}")
    print()
EOF
