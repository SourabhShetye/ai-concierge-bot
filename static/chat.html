<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.bot {
            text-align: left;
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-bubble {
            display: inline-block;
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        .message.bot .message-bubble {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message.user .message-bubble {
            background: #667eea;
            color: white;
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            justify-content: flex-start;
        }
        
        .action-button {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .action-button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .input-container {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-field {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-field:focus {
            border-color: #667eea;
        }
        
        .send-button {
            margin-left: 10px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .send-button:hover {
            background: #5568d3;
            transform: scale(1.05);
        }
        
        .send-button:active {
            transform: scale(0.95);
        }
        
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .connection-status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #666;
        }
        
        .connection-status.connected { color: #4caf50; }
        .connection-status.disconnected { color: #f44336; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🍽️ Restaurant AI Concierge
        </div>
        
        <div class="connection-status" id="connection-status">
            Connecting...
        </div>
        
        <div class="messages-container" id="messages">
            <!-- Messages will be appended here -->
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="message-input" 
                class="input-field" 
                placeholder="Type your message..."
                autocomplete="off"
            >
            <button id="send-button" class="send-button">Send</button>
        </div>
    </div>

    <script>
    // Extract restaurant_id and table_number from URL
    const pathParts = window.location.pathname.split('/');
    const restaurantId = pathParts[2];
    const tableNumber = pathParts[3];
    const sessionId = `${restaurantId}_table_${tableNumber}_${Date.now()}`;
    
    // Auto-detect WebSocket protocol (works on localhost AND production)
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = window.location.host;
    const ws = new WebSocket(`${protocol}//${host}/ws/${sessionId}`);
    
    const messagesContainer = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const connectionStatus = document.getElementById('connection-status');
    
    let currentInputType = 'text';
    
    ws.onopen = () => {
        console.log('Connected to chat server');
        connectionStatus.textContent = '✅ Connected';
        connectionStatus.className = 'connection-status connected';
    };
    
    ws.onclose = () => {
        console.log('Disconnected from chat server');
        connectionStatus.textContent = '❌ Disconnected - Refresh to reconnect';
        connectionStatus.className = 'connection-status disconnected';
    };
    
    ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        connectionStatus.textContent = '❌ Connection error';
        connectionStatus.className = 'connection-status disconnected';
    };
    
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleIncomingMessage(data);
    };
    
    function handleIncomingMessage(data) {
        if (data.type === 'message') {
            addBotMessage(data.content, data.buttons);
            
            if (data.input_type) {
                currentInputType = data.input_type;
                messageInput.type = data.input_type;
            } else {
                currentInputType = 'text';
                messageInput.type = 'text';
            }
        }
    }
    
    function addBotMessage(text, buttons = []) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message bot';
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerHTML = formatMarkdown(text);
        
        messageDiv.appendChild(bubble);
        
        if (buttons && buttons.length > 0) {
            const buttonGroup = document.createElement('div');
            buttonGroup.className = 'button-group';
            
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = 'action-button';
                button.textContent = btn.text;
                button.onclick = () => handleButtonClick(btn.action);
                buttonGroup.appendChild(button);
            });
            
            messageDiv.appendChild(buttonGroup);
        }
        
        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
    }
    
    function addUserMessage(text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message user';
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = currentInputType === 'password' ? '****' : text;
        
        messageDiv.appendChild(bubble);
        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        addUserMessage(text);
        
        ws.send(JSON.stringify({
            type: 'text',
            content: text
        }));
        
        messageInput.value = '';
        messageInput.focus();
    }
    
    function handleButtonClick(action) {
        ws.send(JSON.stringify({
            type: 'button_click',
            action: action
        }));
    }
    
    function formatMarkdown(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/_(.*?)_/g, '<em>$1</em>')
            .replace(/\n/g, '<br>');
    }
    
    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    sendButton.addEventListener('click', sendMessage);
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
    
    window.addEventListener('load', () => {
        messageInput.focus();
    });
</script>
</body>
</html>
