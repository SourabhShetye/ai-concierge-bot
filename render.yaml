# ═══════════════════════════════════════════════════════════════════════════
# Render.com Deployment Configuration
# ═══════════════════════════════════════════════════════════════════════════

services:
  # Main Server (Telegram Bot + Web Chat)
  - type: web
    name: restaurant-concierge
    runtime: python
    plan: free  # Change to 'starter' for paid plan with more resources
    buildCommand: pip install -r requirements.txt
    startCommand: python app/main.py
    
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 10000
    
    healthCheckPath: /ping
    
